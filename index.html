<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graham Robinson — Psychotherapist & Counsellor</title>
  <meta name="description" content="Online psychotherapy for adults across Ireland, the UK, and EU. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5F0E8;
      --sage: #7A9E7E;
      --sage-dark: #4D7A52;
      --terracotta: #C17A5A;
      --charcoal: #2C2C2A;
      --charcoal-soft: #4A4A47;
      --warm-grey: #8A8880;
      --white: #FDFBF7;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--sage);
      margin: 0 auto 2.5rem;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--charcoal);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sage-dark);
      margin-bottom: 2rem;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: var(--sage);
      margin: 0 auto 2rem;
    }

    .message {
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--charcoal-soft);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .message em {
      font-style: italic;
      color: var(--terracotta);
    }

    .therapy-route {
      display: inline-block;
      background: var(--sage);
      color: var(--white);
      padding: 0.875rem 2rem;
      border-radius: 100px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.2s;
      margin-bottom: 3rem;
    }

    .therapy-route:hover {
      background: var(--sage-dark);
      transform: translateY(-1px);
    }

    .footer-note {
      font-size: 0.8rem;
      color: var(--warm-grey);
      line-height: 1.6;
    }

    .footer-note a {
      color: var(--warm-grey);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.2s;
    }

    .footer-note a:hover {
      color: var(--sage-dark);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dot { animation: fadeUp 0.5s ease both; }
    h1 { animation: fadeUp 0.5s ease 0.1s both; }
    .subtitle { animation: fadeUp 0.5s ease 0.15s both; }
    .divider { animation: fadeUp 0.5s ease 0.2s both; }
    .message { animation: fadeUp 0.5s ease 0.25s both; }
    .therapy-route { animation: fadeUp 0.5s ease 0.3s both; }
    .footer-note { animation: fadeUp 0.5s ease 0.35s both; }
  </style>
</head>
<body>
  <div class="container">
    <div class="dot"></div>
    <h1>Graham Robinson</h1>
    <p class="subtitle">Psychotherapist &amp; Counsellor</p>
    <div class="divider"></div>
    <p class="message">This site is coming soon. In the meantime, you can view my profile and <em>book a session</em> using the link below.</p>
    <a href="https://www.therapyroute.com/therapist/graham-robinson-city-location" class="therapy-route" target="_blank">Book a session</a>
    <p class="footer-note">
      Online therapy for adults across Ireland, the UK, and EU.<br>
      &copy; Graham Robinson 2026 &nbsp;&middot;&nbsp;
      <a href="https://drive.proton.me/urls/5AHWYBXE9C#ii1NiZXx7zJV" target="_blank">Client Agreement</a>
    </p>
  </div>
</body>
</html>
